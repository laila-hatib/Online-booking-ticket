services:
  - type: web
    name: onlinebooking-backend
    env: python
    buildCommand: cd "Backened projects/Onlinebookingproject" && pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: cd "Backened projects/Onlinebookingproject" && gunicorn Onlinebookingproject.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173"
